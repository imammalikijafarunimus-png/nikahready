<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" fill="none">
  <defs>
    <pattern id="islamic-pattern" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <!-- Octagonal star / geometric rosette motif -->
      <g opacity="0.08">
        <!-- Central 8-pointed star -->
        <polygon points="30,6 33,27 54,30 33,33 30,54 27,33 6,30 27,27" fill="currentColor" />
        <!-- Outer square rotated 45 degrees -->
        <rect x="12" y="12" width="36" height="36" rx="1" transform="rotate(45 30 30)" stroke="currentColor" stroke-width="1.5" fill="none" />
        <!-- Inner square -->
        <rect x="18" y="18" width="24" height="24" rx="1" stroke="currentColor" stroke-width="1" fill="none" />
        <!-- Corner arcs -->
        <path d="M12,12 Q12,6 18,6" stroke="currentColor" stroke-width="1" fill="none" />
        <path d="M48,6 Q54,6 54,12" stroke="currentColor" stroke-width="1" fill="none" />
        <path d="M54,48 Q54,54 48,54" stroke="currentColor" stroke-width="1" fill="none" />
        <path d="M6,48 Q6,54 12,54" stroke="currentColor" stroke-width="1" fill="none" />
        <!-- Small diamonds -->
        <polygon points="30,16 34,30 30,44 26,30" fill="none" stroke="currentColor" stroke-width="0.5" />
        <!-- Circle accents -->
        <circle cx="30" cy="6" r="2" fill="currentColor" />
        <circle cx="30" cy="54" r="2" fill="currentColor" />
        <circle cx="6" cy="30" r="2" fill="currentColor" />
        <circle cx="54" cy="30" r="2" fill="currentColor" />
      </g>
    </pattern>
  </defs>
  <rect width="120" height="120" fill="url(#islamic-pattern)" />
</svg>
